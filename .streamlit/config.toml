[theme]
primaryColor = "#2563EB"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
font = "sans serif"

[server]
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false
headless = true
port = 8501

[browser]
gatherUsageStats = false

[runner]
magicEnabled = true
