# ============================================================
# MAIN PROJECT CONFIGURATION
# AI-Powered Medical Image Disease Detection Platform
# ============================================================

project:
  name: "Medical AI Disease Detection Platform"
  version: "1.0.0"
  description: "AI-powered chest X-ray pneumonia detection system"
  author: "Your Name"

# === DATA CONFIGURATION ===
data:
  dataset_name: "paultimothymooney/chest-xray-pneumonia"
  raw_path: "./data/raw"
  processed_path: "./data/processed"
  augmented_path: "./data/augmented"
  dataset_path: "./data/raw/chest_xray"
  train_path: "./data/raw/chest_xray/train"
  test_path: "./data/raw/chest_xray/test"
  val_path: "./data/raw/chest_xray/val"
  classes:
    - "NORMAL"
    - "PNEUMONIA"
  class_indices:
    NORMAL: 0
    PNEUMONIA: 1

# === IMAGE CONFIGURATION ===
image:
  target_size: [224, 224]
  channels: 3
  color_mode: "rgb"
  normalization_mean: [0.485, 0.456, 0.406]
  normalization_std: [0.229, 0.224, 0.225]

# === AUGMENTATION CONFIGURATION ===
augmentation:
  rotation_range: 15
  width_shift_range: 0.1
  height_shift_range: 0.1
  shear_range: 0.1
  zoom_range: 0.1
  horizontal_flip: true
  vertical_flip: false
  fill_mode: "nearest"
  brightness_range: [0.8, 1.2]

# === TRAINING CONFIGURATION ===
training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.0001
  min_learning_rate: 0.000001
  validation_split: 0.2
  random_seed: 42
  workers: 4
  use_multiprocessing: false

# === EARLY STOPPING CONFIGURATION ===
early_stopping:
  monitor: "val_loss"
  patience: 10
  restore_best_weights: true
  min_delta: 0.001

# === LEARNING RATE SCHEDULER ===
lr_scheduler:
  monitor: "val_loss"
  factor: 0.5
  patience: 5
  min_lr: 0.000001
  verbose: 1

# === CNN MODEL CONFIGURATION ===
cnn_model:
  name: "custom_cnn"
  filters: [32, 64, 128, 256]
  kernel_size: [3, 3]
  pool_size: [2, 2]
  dense_units: [512, 256]
  dropout_rate: 0.5
  activation: "relu"
  output_activation: "sigmoid"

# === TRANSFER LEARNING CONFIGURATION ===
transfer_learning:
  models:
    - name: "resnet50"
      base_model: "ResNet50"
      fine_tune_at: 100
      dense_units: [512, 256]
      dropout_rate: 0.5

    - name: "densenet121"
      base_model: "DenseNet121"
      fine_tune_at: 100
      dense_units: [512, 256]
      dropout_rate: 0.5

    - name: "efficientnetb0"
      base_model: "EfficientNetB0"
      fine_tune_at: 100
      dense_units: [512, 256]
      dropout_rate: 0.5

# === MODEL SAVING CONFIGURATION ===
models:
  save_path: "./models/saved_models"
  checkpoint_path: "./models/checkpoints"
  weights_path: "./models/model_weights"
  format: "h5"

# === DATABASE CONFIGURATION ===
database:
  type: "sqlite"
  sqlite_path: "./database/medical_ai.db"
  postgresql:
    host: "localhost"
    port: 5432
    database: "medical_ai_db"
    user: "postgres"

# === MLFLOW CONFIGURATION ===
mlflow:
  tracking_uri: "./logs/mlruns"
  experiment_name: "medical_ai_experiments"
  artifact_location: "./logs/mlartifacts"

# === LOGGING CONFIGURATION ===
logging:
  level: "INFO"
  log_file: "./logs/medical_ai.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# === STREAMLIT CONFIGURATION ===
streamlit:
  page_title: "Medical AI Platform"
  page_icon: "🏥"
  layout: "wide"
  sidebar_state: "expanded"
